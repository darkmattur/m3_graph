[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests requiring database

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Test discovery
norecursedirs = .git .venv venv __pycache__ *.egg-info

# Coverage (optional)
# Uncomment to enable coverage reporting
# addopts =
#     --cov=m3_graph
#     --cov-report=term-missing
#     --cov-report=html

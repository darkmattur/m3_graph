when:
  event: [ push, tag, manual ]

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: m3_test
      POSTGRES_USER: m3
      POSTGRES_PASSWORD: m3

steps:

  set-version:
    image: python:3.13-slim
    commands:
      - |
        python - <<'PY'
        import os
        from pathlib import Path

        tag = os.getenv("CI_COMMIT_TAG", "")
        if not tag:
          raise SystemExit("CI_COMMIT_TAG is not set")

        ver = tag[1:] if tag.startswith("v") else tag
        Path("VERSION").write_text(ver + "\n", encoding="utf-8")
        print("Version set to", ver)
        PY
    when:
      event: tag
  
  test:
    image: python:3.13-slim
    environment:
      GITEA_URL:
        from_secret: GITEA_URL
      GITEA_OWNER:
        from_secret: GITEA_OWNER
      GITEA_SVC_USER:
        from_secret: GITEA_SVC_USER
      GITEA_SVC_PASSWORD:
        from_secret: GITEA_SVC_PASSWORD

      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: m3_test
      PGUSER: m3
      PGPASSWORD: m3

    commands:
      - set -eu
      - python -m pip install --upgrade pip

      - |
        host="$(echo "$GITEA_URL" | sed -E 's#^https?://##' | cut -d/ -f1)"
        cat > ~/.netrc <<EOF
        machine $host
          login $GITEA_SVC_USER
          password $GITEA_SVC_PASSWORD
        EOF
        chmod 600 ~/.netrc

        export PIP_EXTRA_INDEX_URL="$GITEA_URL/api/packages/$GITEA_OWNER/pypi/simple"
        export PIP_TRUSTED_HOST="$host"
        echo "Using extra index: $PIP_EXTRA_INDEX_URL"
        
      - pip install -e .[dev]
      - |
        if [ -d tests ] && find test -type f -name "test_*.py" | grep -q .; then
          echo "Running pytest..."
          pytest -q
        else
          echo "No tests/ directory with test_*.py files found — skipping pytest."
        fi
      - rm -rf src/*.egg-info src/*/*.egg-info *.egg-info
    when:
      event: [ push, tag, manual ]

  build:
    image: mambaorg/micromamba:latest
    depends_on: [ test ]
    commands:
      - set -eu

      - |
        cat > ~/.condarc <<'YAML'
        channels:
          - http://conda_m3
          - conda-forge
          - defaults
        channel_priority: strict
        show_channel_urls: true
        auto_activate_base: false
        allow_non_channel_urls: true
        YAML

      - micromamba create -y -n build -c conda-forge python=3.13 conda-build python-build pip grayskull

      - micromamba run -n build conda config --set channel_priority strict
      - micromamba run -n build conda config --add channels conda-forge

      - rm -rf dist
      - micromamba run -n build python -m build --sdist

      - rm -rf conda/recipe
      - mkdir -p conda/recipe
      - |
        set -euo pipefail
        sdist="$(ls -1 dist/*.tar.gz | head -n1)"
        test -n "$sdist"
        echo "Generating recipe from sdist: $sdist"

        micromamba run -n build grayskull pypi "$sdist" \
          --output conda/recipe \
          --package-indexes http://conda_m3 conda-forge

      # Patch generated meta.yaml:
      # - remove placeholder license_file
      # - replace test section (avoid import-time side effects)
      - |
        set -euo pipefail
        meta="$(find conda/recipe -maxdepth 3 -name meta.yaml -print -quit)"
        echo "Patching meta.yaml: $meta"
        test -n "$meta"

        micromamba run -n build python - "$meta" <<'PY'
        import sys
        from pathlib import Path

        meta = Path(sys.argv[1])
        lines = meta.read_text(encoding="utf-8").splitlines()

        def is_toplevel_key(s: str) -> bool:
            return bool(s) and (not s.startswith((" ", "\t"))) and s.rstrip().endswith(":")

        out = []
        i = 0
        n = len(lines)

        while i < n:
            line = lines[i]

            # Drop Grayskull placeholder license file
            if line.strip() == "license_file: PLEASE_ADD_LICENSE_FILE":
                i += 1
                continue

            # Drop entire existing top-level test: block (imports cause failures)
            if line.strip() == "test:" and not line.startswith((" ", "\t")):
                i += 1
                while i < n and not is_toplevel_key(lines[i]):
                    i += 1
                continue

            out.append(line)
            i += 1

        # Append safe test block
        out.append("")
        out.append("test:")
        out.append("  requires:")
        out.append("    - pip")
        out.append("  commands:")
        out.append("    - python -m pip check")

        with meta.open("w", encoding="utf-8", newline="\n") as f:
            for l in out:
                print(l, file=f)
        PY

      - rm -rf conda-dist
      - |
        set -euo pipefail
        recipe_dir="$(dirname "$(find conda/recipe -maxdepth 3 -name meta.yaml -print -quit)")"
        echo "Using recipe dir: $recipe_dir"
        test -n "$recipe_dir"
        micromamba run -n build conda build -c conda-forge "$recipe_dir" --output-folder conda-dist
    when:
      event: [ push, tag, manual ]
  
  publish-conda:
    image: curlimages/curl:8.10.1
    depends_on: [ build ]
    environment:
      CONDA_PUBLISH_URL:
        from_secret: CONDA_PUBLISH_URL
    commands:
      - |
        set -eu
        base="$CONDA_PUBLISH_URL"

        found=0
        while IFS= read -r f; do
          found=1

          channel="$(basename "$(dirname "$f")")"
          name="$(basename "$f")"

          echo "Uploading $f -> $base/$channel/$name"
          curl --fail-with-body -sS \
            --upload-file "$f" \
            -X PUT \
            "$base/$channel/$name"
        done < <(find conda-dist -type f \( -name '*.conda' -o -name '*.tar.bz2' \) -print)

        if [ "$found" -eq 0 ]; then
          echo "No conda artifacts produced under conda-dist/"
          exit 1
        fi
    when:
      event: tag

  publish-gitea:
    image: curlimages/curl:8.10.1
    depends_on: [ build ]
    environment:
      GITEA_URL:
        from_secret: GITEA_URL
      GITEA_OWNER:
        from_secret: GITEA_OWNER
      GITEA_SVC_USER:
        from_secret: GITEA_SVC_USER
      GITEA_SVC_PASSWORD:
        from_secret: GITEA_SVC_PASSWORD
    commands:
      - |
        set -eu

        base="$GITEA_URL/api/packages/$GITEA_OWNER/conda"
        auth="$GITEA_SVC_USER:$GITEA_SVC_PASSWORD"

        found=0
        while IFS= read -r f; do
          found=1

          channel="$(basename "$(dirname "$f")")"
          name="$(basename "$f")"

          echo "Uploading $f -> $base/$channel/$name"
          curl --fail-with-body -sS \
            -u "$auth" \
            --upload-file "$f" \
            -X PUT \
            "$base/$channel/$name"
        done < <(find conda-dist -type f \( -name '*.conda' -o -name '*.tar.bz2' \) -print)

        if [ "$found" -eq 0 ]; then
          echo "No conda artifacts produced under conda-dist/"
          exit 1
        fi
    when:
      event: tag

  publish-pypi:
    image: python:3.13-slim
    depends_on: [ build ]
    environment:
      GITEA_URL:
        from_secret: GITEA_URL
      GITEA_OWNER:
        from_secret: GITEA_OWNER
      GITEA_SVC_USER:
        from_secret: GITEA_SVC_USER
      GITEA_SVC_PASSWORD:
        from_secret: GITEA_SVC_PASSWORD
    commands:
      - |
        set -eu

        python -m pip install --no-cache-dir -U pip
        python -m pip install --no-cache-dir build twine

        # Build wheel + sdist
        rm -rf dist
        python -m build

        # Sanity check artifacts exist
        found=0
        for f in dist/*.whl dist/*.tar.gz; do
          [ -e "$f" ] || continue
          found=1
          break
        done
        if [ "$found" -eq 0 ]; then
          echo "No PyPI artifacts produced in dist/ (expected *.whl and/or *.tar.gz)"
          exit 1
        fi

        repo_url="$GITEA_URL/api/packages/$GITEA_OWNER/pypi"
        export TWINE_REPOSITORY_URL="$repo_url"
        export TWINE_USERNAME="$GITEA_SVC_USER"
        export TWINE_PASSWORD="$GITEA_SVC_PASSWORD"

        echo "Uploading Python packages to $repo_url"
        python -m twine upload --non-interactive dist/*
    when:
      event: tag
  